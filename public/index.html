<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidHub | Emulation</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #07030f;
    --deep: #0d0818;
    --surface: #130d24;
    --border: #2a1a4a;
    --accent: #8b2fc9;
    --accent2: #c044ff;
    --glow: #d580ff;
    --text: #c8b8e8;
    --dim: #5a4a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--void);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: default;
  }

  /* Void noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9998;
    opacity: 0.4;
  }

  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed;
    inset: 0;
    background: var(--void);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 9997;
    transition: opacity 0.8s;
  }

  .void-logo {
    font-family: 'VT323', monospace;
    font-size: 52px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--accent2), var(--glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(192,68,255,0.5));
  }

  .void-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: -18px;
  }

  .load-bar-wrap {
    width: 320px;
    height: 3px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .load-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--glow));
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 12px var(--accent2);
  }

  #load-status {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    min-height: 20px;
    max-width: 320px;
    text-align: center;
    padding: 0 16px;
    line-height: 1.4;
    word-break: break-word;
  }

  .load-pct {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--accent2);
  }

  /* ── MAIN ── */
  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--deep);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
  }

  .sdot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Screen */
  #screen_container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    overflow: hidden;
  }

  #screen_container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(139,47,201,0.08) 100%);
    pointer-events: none;
    z-index: 1;
  }

  #screen_container canvas {
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
    box-shadow:
      0 0 0 1px var(--border),
      0 0 60px rgba(139,47,201,0.2),
      0 0 120px rgba(139,47,201,0.08);
    position: relative;
    z-index: 2;
  }

  /* Controls */
  .controls {
    background: var(--deep);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .btn {
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 10px rgba(192,68,255,0.15); }
  .btn:active { background: rgba(192,68,255,0.1); }

  #status-text {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-left: auto;
    text-transform: uppercase;
  }

  #mips-display {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--accent2);
  }
</style>
</head>
<body>

<div id="loader">
  <div class="void-logo">VOIDHUB</div>
  <div class="void-sub">Emulation Platform</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-pct" id="load-pct">0%</div>
  <div id="load-status">Initializing void...</div>
  <button id="skip-btn" onclick="hideLoader()" style="
    display:none; margin-top:8px; background:none; border:1px solid #2a1a4a;
    color:#5a4a7a; padding:6px 20px; font-family:'Rajdhani',sans-serif;
    font-size:12px; letter-spacing:2px; cursor:pointer; border-radius:4px;
    text-transform:uppercase;
  ">Skip → Enter Anyway</button>
</div>

<div id="app">
  <div class="header">
    <div class="header-logo">VOIDHUB // EMULATION</div>
    <div class="header-right">
      <div class="status-pill"><span class="sdot"></span><span id="run-status">RUNNING</span></div>
      <span id="mips-display">— MIPS</span>
    </div>
  </div>

  <div id="screen_container"><canvas></canvas></div>

  <div class="controls">
    <button class="btn" onclick="sendCtrlAltDel()">Ctrl+Alt+Del</button>
    <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
    <button class="btn" onclick="emulator.restart()">Restart</button>
    <button class="btn" onclick="emulator.save_state().then(s => console.log('saved'))">Save State</button>
    <span id="status-text">Booting Windows 95...</span>
  </div>
</div>

<script src="/v86/libv86.js"></script>
<script>
// ── Loading ───────────────────────────────────────────────────────────────
const bar = document.getElementById('load-bar');
const pct = document.getElementById('load-pct');
const statusEl = document.getElementById('load-status');
const startTime = Date.now();

function setLoad(p, msg) {
  bar.style.width = p + '%';
  pct.textContent = Math.round(p) + '%';
  if (msg) {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(0);
    const remaining = p > 5 ? Math.max(0, Math.round((100 - p) / p * elapsed)) : '?';
    statusEl.textContent = msg + ` — ${elapsed}s elapsed, ~${remaining}s left`;
  }
}

// ── v86 emulator ──────────────────────────────────────────────────────────
// Assets are pre-cached in Docker — fetched from local server instantly
setLoad(10, 'Loading BIOS from server...');

// Track multiple file downloads
const fileProgress = {};

const emulator = new V86({
  screen_container: document.getElementById('screen_container'),
  wasm_path: '/v86/v86.wasm',
  bios:     { url: '/v86/bios/seabios.bin' },
  vga_bios: { url: '/v86/bios/vgabios.bin' },
  hda: {
    url: 'https://copy.sh/v86/images/windows95.img',
    size: 242 * 1024 * 1024,
    async: true,
  },
  memory_size:     64 * 1024 * 1024,
  vga_memory_size:  8 * 1024 * 1024,
  autostart: true,
  acpi: true,
});

// Real progress — track all files separately
emulator.add_listener('download-progress', (e) => {
  const name = (e.file_name || '').split('/').pop() || 'asset';
  if (e.total && e.total > 0) {
    fileProgress[name] = { loaded: e.loaded, total: e.total };
  }
  // Sum all known progress
  const totalLoaded = Object.values(fileProgress).reduce((s,f) => s + f.loaded, 0);
  const totalSize   = Object.values(fileProgress).reduce((s,f) => s + f.total, 0);
  const p = totalSize > 0 ? Math.min(10 + Math.round((totalLoaded / totalSize) * 65), 75) : 10;
  const mb = (e.loaded / 1024 / 1024).toFixed(1);
  const tot = e.total > 0 ? (e.total / 1024 / 1024).toFixed(1) + ' MB' : '...';
  setLoad(p, `Loading ${name} — ${mb} / ${tot}`);
});

emulator.add_listener('download-complete', (e) => {
  const name = (e.file_name || '').split('/').pop() || 'asset';
  setLoad(76, `✓ ${name} ready`);
});

function hideLoader() {
  clearInterval(window._crawlInterval);
  const loader = document.getElementById('loader');
  if (loader.style.display === 'none') return;
  setLoad(100, 'Entering the void...');
  loader.style.opacity = '0';
  setTimeout(() => {
    loader.style.display = 'none';
    document.getElementById('status-text').textContent = 'Windows 95 — Running';
  }, 600);
}

emulator.add_listener('emulator-ready', () => {
  setLoad(50, 'CPU ready — Windows booting...');
  let crawl = 50;
  const msgs = [
    [55, 'Loading DOS kernel...'],
    [65, 'Starting Windows 95...'],
    [75, 'Loading desktop shell...'],
    [85, 'Initializing Explorer...'],
    [95, 'Almost ready...'],
  ];
  let msgI = 0;

  window._crawlInterval = setInterval(() => {
    crawl += 0.08; // never stops — keeps going past 95 slowly
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    bar.style.width = Math.min(crawl, 99) + '%';
    pct.textContent = Math.min(Math.round(crawl), 99) + '%';
    if (msgI < msgs.length && crawl >= msgs[msgI][0]) {
      statusEl.textContent = msgs[msgI][1] + ` — ${elapsed}s`;
      msgI++;
    } else {
      // Update elapsed every tick
      if (statusEl.textContent.includes('—')) {
        statusEl.textContent = statusEl.textContent.replace(/— \d+s/, `— ${elapsed}s`);
      }
    }
  }, 200);
});

// Show skip button after 30s
setTimeout(() => {
  const btn = document.getElementById('skip-btn');
  if (btn) btn.style.display = 'block';
}, 30000);

// Force hide after 2 mins absolute max
setTimeout(hideLoader, 120000);

let serialLines = '';
let lastSerialPct = 82;
emulator.add_listener('serial0-output-char', (char) => {
  serialLines += char;
  if (serialLines.length > 500) serialLines = serialLines.slice(-500);
  if (serialLines.includes('Starting Windows 95')) { lastSerialPct = 91; setLoad(91, 'Starting Windows 95 shell...'); }
  else if (serialLines.includes('Starting Windows')) { lastSerialPct = 88; setLoad(88, 'Starting Windows...'); }
  else if (serialLines.includes('HIMEM')) setLoad(Math.max(lastSerialPct, 83), 'Loading HIMEM memory manager...');
  else if (serialLines.includes('MSCDEX')) setLoad(Math.max(lastSerialPct, 84), 'Loading CD-ROM driver...');
  else if (serialLines.includes('SMARTDRV')) setLoad(Math.max(lastSerialPct, 85), 'Loading disk cache...');
  else if (serialLines.includes('IFSHLP')) setLoad(Math.max(lastSerialPct, 86), 'Loading filesystem helper...');
  else if (serialLines.includes('Loading device')) setLoad(Math.max(lastSerialPct, 87), 'Loading device drivers...');
});

emulator.add_listener('screen-set-size-graphical', hideLoader);

// MIPS counter
setInterval(() => {
  if (emulator.is_running()) {
    document.getElementById('mips-display').textContent =
      Math.round(emulator.get_instruction_counter() / 1e6) + ' MIPS';
    emulator.reset_instruction_counter();
    document.getElementById('status-text').textContent = 'Windows 95 — Running';
    document.getElementById('run-status').textContent = 'ONLINE';
  }
}, 1000);

function sendCtrlAltDel() {
  emulator.keyboard_send_scancodes([0x1D, 0x38, 0x53]);
  setTimeout(() => emulator.keyboard_send_scancodes([0xD3, 0xB8, 0x9D]), 100);
}

function toggleFullscreen() {
  const el = document.getElementById('screen_container');
  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
}
</script>
</body>
